<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gayerdar 日報戰情系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Gayerdar 日報戰情系統</h1>
            <div class="date-time" id="reportDate">載入中...</div>
        </header>

        <main class="dashboard-main">
            <section class="dashboard-section overview">
                <h2>📊 核心數據概覽</h2>
                <div class="overview-grid">
                    <div class="kpi-card">
                        <h3>總營收</h3>
                        <p class="kpi-value" id="todayRevenue">—</p>
                    </div>
                    <div class="kpi-card">
                        <h3>總訂單數</h3>
                        <p class="kpi-value" id="todayOrders">—</p>
                    </div>
                    <div class="kpi-card">
                        <h3>平均訂單價值</h3>
                        <p class="kpi-value" id="avgOrder">—</p>
                    </div>
                    <div class="kpi-card">
                        <h3>進站訪客</h3>
                        <p class="kpi-value" id="totalVisitors">—</p>
                    </div>
                </div>
            </section>

            <section class="dashboard-section funnel">
                <h2>📈 銷售漏斗分析</h2>
                <div class="funnel-steps">
                    <div class="funnel-card">
                        <h3>進站訪客</h3>
                        <p class="funnel-value" id="funnelVisitors">—</p>
                    </div>
                    <div class="funnel-card">
                        <h3>新註冊會員</h3>
                        <p class="funnel-value" id="funnelNewUsers">—</p>
                        <span class="conversion-rate" id="visitorToRegRate">—</span>
                    </div>
                    <div class="funnel-card">
                        <h3>成功付費</h3>
                        <p class="funnel-value" id="funnelPaid">—</p>
                        <span class="conversion-rate" id="regToPaidRate">—</span>
                    </div>
                    <div class="funnel-card">
                        <h3>整體轉換率</h3>
                        <p class="funnel-value" id="overallRate">—</p>
                    </div>
                </div>
            </section>

            <section class="dashboard-section channels">
                <h2>🎯 渠道表現 (Top 5)</h2>
                <div class="channel-list" id="topChannels">
                    <p>載入中...</p>
                </div>
            </section>
        </main>

        <footer class="dashboard-footer">
            <p>&copy; 2026 Gayerdar Data Dashboard</p>
        </footer>
    </div>

    <script>
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',');
            const values = lines[1].split(',');
            const obj = {};
            headers.forEach((h, i) => obj[h.trim()] = values[i].trim());
            return obj;
        }

        function pct(a, b) {
            if (!b || b == 0) return '—';
            return (a / b * 100).toFixed(2) + '%';
        }

        fetch('data/2026-03-30_gayerdar_kpi.csv')
            .then(r => r.text())
            .then(text => {
                const d = parseCSV(text);

                document.getElementById('reportDate').textContent = d.date + ' 日報';
                document.getElementById('todayRevenue').textContent = '$' + parseFloat(d.revenue).toFixed(2);
                document.getElementById('todayOrders').textContent = d.orders;
                document.getElementById('avgOrder').textContent = '$' + parseFloat(d.avg_order).toFixed(2);
                document.getElementById('totalVisitors').textContent = parseInt(d.visitors).toLocaleString();

                // Funnel
                document.getElementById('funnelVisitors').textContent = parseInt(d.visitors).toLocaleString();
                document.getElementById('funnelNewUsers').textContent = d.new_users;
                document.getElementById('visitorToRegRate').textContent = pct(d.new_users, d.visitors);
                document.getElementById('funnelPaid').textContent = d.paid;
                document.getElementById('regToPaidRate').textContent = pct(d.paid, d.new_users);
                document.getElementById('overallRate').textContent = pct(d.paid, d.visitors);

                // Channels
                const channels = [
                    { name: d.channel_1_name, visits: d.channel_1_visits },
                    { name: d.channel_2_name, visits: d.channel_2_visits },
                    { name: d.channel_3_name, visits: d.channel_3_visits },
                    { name: d.channel_4_name, visits: d.channel_4_visits },
                    { name: d.channel_5_name, visits: d.channel_5_visits },
                ];
                const total = channels.reduce((s, c) => s + parseInt(c.visits), 0);
                document.getElementById('topChannels').innerHTML = channels.map(c => `
                    <div class="channel-item">
                        <span class="channel-name">${c.name}</span>
                        <div class="channel-bar-wrap">
                            <div class="channel-bar" style="width:${(c.visits/total*100).toFixed(1)}%"></div>
                        </div>
                        <span class="channel-visits">${parseInt(c.visits).toLocaleString()}</span>
                    </div>
                `).join('');
            })
            .catch(err => {
                document.querySelector('.dashboard-main').innerHTML = '<p style="color:red;padding:2rem">數據載入失敗：' + err.message + '</p>';
            });
    </script>
</body>
</html>
