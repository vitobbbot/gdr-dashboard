<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDR 日報戰情系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
    <header>
        <h1>GDR 日報戰情系統</h1>
        <div id="reportDate" class="subtitle">載入中...</div>
    </header>

    <section class="block">
        <h2>📊 核心數據</h2>
        <div class="kpi-grid">
            <div class="kpi"><span class="label">總營收</span><span class="val cyan" id="revenue">—</span></div>
            <div class="kpi"><span class="label">總訂單數</span><span class="val cyan" id="orders">—</span></div>
            <div class="kpi"><span class="label">平均訂單價值</span><span class="val cyan" id="avg">—</span></div>
            <div class="kpi"><span class="label">進站訪客</span><span class="val cyan" id="visitors">—</span></div>
        </div>
    </section>

    <section class="block">
        <h2>📈 銷售漏斗</h2>
        <div class="funnel-grid">
            <div class="funnel-step">
                <div class="f-label">進站訪客</div>
                <div class="f-val purple" id="fVisitors">—</div>
                <div class="f-rate"></div>
            </div>
            <div class="funnel-arrow">▶</div>
            <div class="funnel-step">
                <div class="f-label">新註冊會員</div>
                <div class="f-val purple" id="fNewUsers">—</div>
                <div class="f-rate cyan" id="rVisitorToReg">—</div>
            </div>
            <div class="funnel-arrow">▶</div>
            <div class="funnel-step">
                <div class="f-label">成功付費</div>
                <div class="f-val purple" id="fPaid">—</div>
                <div class="f-rate cyan" id="rRegToPaid">—</div>
            </div>
            <div class="funnel-arrow">▶</div>
            <div class="funnel-step highlight">
                <div class="f-label">整體轉換率</div>
                <div class="f-val cyan" id="fOverall">—</div>
                <div class="f-rate"></div>
            </div>
        </div>
    </section>

    <section class="block">
        <h2>🎯 渠道表現 Top 5</h2>
        <div id="channels" class="channel-list">載入中...</div>
    </section>

    <footer>&copy; 2026 GDR Data Dashboard</footer>
</div>

<script>
function parseCSV(t) {
    const [h, v] = t.trim().split('\n');
    const keys = h.split(','), vals = v.split(','), o = {};
    keys.forEach((k, i) => o[k.trim()] = vals[i].trim());
    return o;
}
function pct(a, b) {
    return (!b || +b === 0) ? '—' : (+a / +b * 100).toFixed(2) + '%';
}
function set(id, val) { document.getElementById(id).textContent = val; }

fetch('data/2026-03-30_gayerdar_kpi.csv').then(r => r.text()).then(txt => {
    const d = parseCSV(txt);
    set('reportDate', d.date + ' 日報');
    set('revenue', '$' + (+d.revenue).toFixed(2));
    set('orders', d.orders);
    set('avg', '$' + (+d.avg_order).toFixed(2));
    set('visitors', (+d.visitors).toLocaleString());
    set('fVisitors', (+d.visitors).toLocaleString());
    set('fNewUsers', d.new_users);
    set('rVisitorToReg', pct(d.new_users, d.visitors));
    set('fPaid', d.paid);
    set('rRegToPaid', pct(d.paid, d.new_users));
    set('fOverall', pct(d.paid, d.visitors));

    const ch = [1,2,3,4,5].map(i => ({ name: d['channel_'+i+'_name'], v: +d['channel_'+i+'_visits'] }));
    const total = ch.reduce((s, c) => s + c.v, 0);
    document.getElementById('channels').innerHTML = ch.map(c => `
        <div class="ch-row">
            <span class="ch-name">${c.name}</span>
            <div class="ch-bar-wrap"><div class="ch-bar" style="width:${(c.v/total*100).toFixed(1)}%"></div></div>
            <span class="ch-num">${c.v.toLocaleString()}</span>
        </div>`).join('');
}).catch(e => {
    document.querySelector('.wrap').innerHTML += '<p class="err">數據載入失敗：' + e.message + '</p>';
});
</script>
</body>
</html>
