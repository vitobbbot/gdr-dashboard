<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gayerdar 日報戰情系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Gayerdar 日報戰情系統</h1>
            <div class="date-time" id="currentDateTime"></div>
        </header>

        <main class="dashboard-main">
            <section class="dashboard-section overview">
                <h2>📊 核心數據概覽</h2>
                <div class="overview-grid">
                    <div class="kpi-card">
                        <h3>總營收 (今日)</h3>
                        <p class="kpi-value" id="todayRevenue">讀取中...</p>
                    </div>
                    <div class="kpi-card">
                        <h3>總訂單數 (今日)</h3>
                        <p class="kpi-value" id="todayOrders">讀取中...</p>
                    </div>
                    <div class="kpi-card">
                        <h3>總營收 (昨日)</h3>
                        <p class="kpi-value" id="yesterdayRevenue">讀取中...</p>
                    </div>
                    <div class="kpi-card">
                        <h3>總訂單數 (昨日)</h3>
                        <p class="kpi-value" id="yesterdayOrders">讀取中...</p>
                    </div>
                </div>
            </section>

            <section class="dashboard-section funnel">
                <h2>📈 銷售漏斗分析</h2>
                <div class="funnel-steps">
                    <div class="funnel-card">
                        <h3>進站訪客</h3>
                        <p class="funnel-value" id="totalVisitors">讀取中...</p>
                    </div>
                    <div class="funnel-card">
                        <h3>註冊會員</h3>
                        <p class="funnel-value" id="registeredUsers">讀取中...</p>
                        <span class="conversion-rate" id="visitorToRegRate">-</span>
                    </div>
                    <div class="funnel-card">
                        <h3>下單意願</h3>
                        <p class="funnel-value" id="initiatedCheckout">讀取中...</p>
                        <span class="conversion-rate" id="regToCheckoutRate">-</span>
                    </div>
                    <div class="funnel-card">
                        <h3>成功付費</h3>
                        <p class="funnel-value" id="paidCustomers">讀取中...</p>
                        <span class="conversion-rate" id="checkoutToPaidRate">-</span>
                    </div>
                </div>
            </section>

            <section class="dashboard-section channels">
                <h2>🎯 渠道表現 (Top 5)</h2>
                <div class="channel-list" id="topChannels">
                    <!-- Channel data will be injected here -->
                    <p>讀取中...</p>
                </div>
            </section>

            <section class="dashboard-section anomaly">
                <h2>⚠️ 異常警示</h2>
                <div class="anomaly-alerts" id="anomalyAlerts">
                    <!-- Anomaly alerts will be injected here -->
                    <p>目前無異常。</p>
                </div>
            </section>
        </main>

        <footer class="dashboard-footer">
            <p>&copy; 2026 Gayerdar Data Dashboard. All rights reserved.</p>
        </footer>
    </div>

    <script>
        function updateDateTime() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('currentDateTime').textContent = now.toLocaleString('zh-Hant', options);
        }
        setInterval(updateDateTime, 1000);
        updateDateTime(); // Initial call
    </script>
</body>
</html>
